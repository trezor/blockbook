prefix: blockbook_
metrics:
  websocket_requests:
    name: blockbook_websocket_requests
    type: counter_vec
    help: Method calls accepted by the websocket API, labeled by method and success/failure status
    labels: [method, status]
  websocket_subscribes:
    name: blockbook_websocket_subscribes
    type: gauge_vec
    help: Active websocket subscription gauges, one series per subscription method
    labels: [method]
  websocket_clients:
    name: blockbook_websocket_clients
    type: gauge
    help: Open client connections to the websocket API
  websocket_req_duration:
    name: blockbook_websocket_req_duration
    type: histogram_vec
    help: Time spent handling each websocket request, in microseconds, labeled by method
    labels: [method]
    buckets: [10, 100, 1000, 10000, 100000, 1000000, 100000000]
  websocket_channel_closes:
    name: blockbook_websocket_channel_closes
    type: counter_vec
    help: Connection close events observed by the websocket handler, split by close reason
    labels: [reason]
  websocket_unknown_methods:
    name: blockbook_websocket_unknown_methods
    type: counter_vec
    help: Websocket requests rejected because the method name is not supported
    labels: [method]
  websocket_addr_notifications:
    name: blockbook_websocket_addr_notifications
    type: counter_vec
    help: Per-address transaction notifications sent over websockets, split by mempool or new-block source
    labels: [source]
  websocket_new_block_txs:
    name: blockbook_websocket_new_block_txs
    type: counter_vec
    help: Outcomes while matching, converting and publishing confirmed block transactions for newBlockTxs subscribers
    labels: [stage, status]
  websocket_new_block_txs_duration_seconds:
    name: blockbook_websocket_new_block_txs_duration_seconds
    type: histogram_vec
    help: Time spent in newBlockTxs processing stages such as address matching and transaction conversion
    labels: [stage]
    buckets: [0.0005, 0.001, 0.005, 0.01, 0.05, 0.1, 0.25, 0.5, 1, 2, 5, 10]
  balance_history_fiat_duration_seconds:
    name: blockbook_balance_history_fiat_duration_seconds
    type: histogram_vec
    help: Time spent attaching fiat rates to address or xpub history responses, split by endpoint path, batch/fallback mode and status
    labels: [path, mode, status]
    buckets: [0.0005, 0.001, 0.005, 0.01, 0.05, 0.1, 0.25, 0.5, 1, 2, 5, 10, 20]
  balance_history_fiat_fallback_total:
    name: blockbook_balance_history_fiat_fallback_total
    type: counter_vec
    help: Batch fiat-rate lookup failures that fell back to per-point lookups, split by endpoint path and reason
    labels: [path, reason]
  balance_history_points:
    name: blockbook_balance_history_points
    type: histogram_vec
    help: Output point count for address or xpub balance-history responses
    labels: [path]
    buckets: [1, 2, 5, 10, 20, 40, 80, 160, 320, 640, 1280]
  balance_history_txs:
    name: blockbook_balance_history_txs
    type: histogram_vec
    help: Transactions aggregated per balance-history request (the per-request DB work the cap bounds), split by transport and endpoint path; clamped at the configured cap+1 when the cap rejects the request
    labels: [transport, path]
    buckets: [1, 10, 100, 1000, 5000, 25000, 50000, 100000, 250000, 500000, 1000000, 2000000]
  balance_history_cap_exceeded_total:
    name: blockbook_balance_history_cap_exceeded_total
    type: counter_vec
    help: Balance-history requests rejected because the requested range spanned more transactions than the configured cap, split by transport and endpoint path
    labels: [transport, path]
  websocket_eth_receipt:
    name: blockbook_websocket_eth_receipt
    type: counter_vec
    help: Outcomes when enriching Ethereum newBlockTxs websocket notifications with transaction receipts
    labels: [status]
  websocket_new_block_txs_subscriptions:
    name: blockbook_websocket_new_block_txs_subscriptions
    type: gauge
    help: Address subscriptions that opted into confirmed-block newBlockTxs notifications
  websocket_new_block_notifications:
    name: blockbook_websocket_new_block_notifications
    type: counter
    help: New block notifications delivered to subscribeNewBlock subscribers, incremented by the number of subscribed clients on every indexed block
  websocket_connection_requests:
    name: blockbook_websocket_connection_requests
    type: histogram
    help: Requests handled per websocket connection over its lifetime, recorded when the connection closes
    buckets: [1, 10, 100, 1000, 10000, 100000, 1000000]
  websocket_connection_rejections:
    name: blockbook_websocket_connection_rejections
    type: counter_vec
    help: Websocket connection attempts rejected by the per-IP limiter before upgrade, split by reason
    labels: [reason]
  websocket_unique_ips:
    name: blockbook_websocket_unique_ips
    type: gauge
    help: Distinct client IP addresses currently holding at least one websocket connection; websocket_clients divided by this is the average connections per IP
  websocket_max_connections_per_ip:
    name: blockbook_websocket_max_connections_per_ip
    type: gauge
    help: Largest number of concurrent websocket connections held by any single client IP, the size of the biggest connection cluster
  websocket_blocked_ips:
    name: blockbook_websocket_blocked_ips
    type: gauge
    help: Distinct client keys (IPv4 address or IPv6 /64 prefix) currently blocked from opening websocket connections after tripping the per-connection message rate limit
  websocket_blocked_connections:
    name: blockbook_websocket_blocked_connections
    type: counter
    help: Websocket connection attempts rejected before upgrade because the client key was on the temporary IP blocklist
  rest_ui_rate_limit_rejections:
    name: blockbook_rest_ui_rate_limit_rejections
    type: counter_vec
    help: Public HTTP requests (explorer UI and REST API) rejected by the per-IP limiter before handler work
    labels: [reason]
  rest_ui_active_ips:
    name: blockbook_rest_ui_active_ips
    type: gauge
    help: Distinct client keys with at least one in-flight public HTTP request (explorer UI or REST API)
  rest_ui_max_active_requests_per_ip:
    name: blockbook_rest_ui_max_active_requests_per_ip
    type: gauge
    help: Largest number of in-flight public HTTP requests (explorer UI or REST API) held by one client key
  rest_ui_blocked_ips:
    name: blockbook_rest_ui_blocked_ips
    type: gauge
    help: Distinct client keys currently blocked from public HTTP requests (explorer UI or REST API)
  index_resync_duration:
    name: blockbook_index_resync_duration
    type: histogram
    help: Time for one successful index resync (a sync-loop iteration that connected blocks), including catch-up work, retry handling and reorg checks, in milliseconds
    buckets: [10, 100, 500, 1000, 2000, 5000, 10000]
  mempool_resync_duration:
    name: blockbook_mempool_resync_duration
    type: histogram
    help: Time to reload the backend mempool and rebuild Blockbook's in-memory mempool snapshot, in milliseconds
    buckets: [10, 100, 500, 1000, 2000, 5000, 10000]
  mempool_resync_throughput_txs_per_second:
    name: blockbook_mempool_resync_throughput_txs_per_second
    type: histogram_vec
    help: Transactions returned by a mempool reload divided by reload duration; failures are recorded with status=failure and throughput 0
    labels: [chain, status]
    buckets: [0.1, 0.5, 1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000, 5000]
  txcache_efficiency:
    name: blockbook_txcache_efficiency
    type: counter_vec
    help: txCache lookups by outcome (hit or miss)
    labels: [status]
  rpc_latency:
    name: blockbook_rpc_latency
    type: histogram_vec
    help: Blockbook-to-backend round-trip time in milliseconds, labeled by method and whether the call failed
    labels: [method, error]
    buckets: [1, 5, 10, 25, 50, 100, 250, 500, 1000, 2000, 5000]
  rpc_fallback_calls_total:
    name: blockbook_rpc_fallback_calls_total
    type: counter_vec
    help: Non-primary chain-data paths selected when preferred lookups cannot answer, labeled by component and reason
    labels: [component, reason]
  eth_call_requests:
    name: blockbook_eth_call_requests
    type: counter_vec
    help: EVM read calls issued by contract metadata, NFT, staking and related enrichment paths, split by call mode
    labels: [mode]
  eth_call_errors:
    name: blockbook_eth_call_errors
    type: counter_vec
    help: Failed EVM read calls, split by call mode and provider/error class
    labels: [mode, type]
  eth_call_batch_size:
    name: blockbook_eth_call_batch_size
    type: histogram
    help: EVM read operations coalesced into one backend request
    buckets: [1, 2, 5, 10, 20, 50, 100, 200]
  eth_call_contract_info_requests:
    name: blockbook_eth_call_contract_info_requests
    type: counter_vec
    help: Contract metadata field lookups such as symbol, name or decimals
    labels: [field]
  eth_call_token_uri_requests:
    name: blockbook_eth_call_token_uri_requests
    type: counter_vec
    help: NFT metadata lookups for tokenURI-style contract methods
    labels: [method]
  eth_call_staking_pool_requests:
    name: blockbook_eth_call_staking_pool_requests
    type: counter_vec
    help: Contract field reads used by staking enrichment code
    labels: [field]
  index_resync_errors:
    name: blockbook_index_resync_errors
    type: counter_vec
    help: Index resync loop failures, labeled by coarse error outcome
    labels: [error]
  index_block_not_found_retries:
    name: blockbook_index_block_not_found_retries
    type: counter
    help: Number of transient ErrBlockNotFound responses from the backend during sync (load-balanced RPC routing skew, indexer ahead of backend, etc.)
  index_reorg_events:
    name: blockbook_index_reorg_events
    type: counter_vec
    help: 'Chain reorganization events detected during sync, by detection path (fork: in-stream prevHash mismatch; resync: missing block hash triggered sync restart; disconnect: local-best fork triggered DB rollback)'
    labels: [type]
  index_sync_yields:
    name: blockbook_index_sync_yields
    type: counter_vec
    help: 'Number of times sync yielded to the outer resync machinery for non-reorg reasons (reason=deadline: MaxStallDuration elapsed in retry loop; reason=probe_failed: chain-state probe failed for the configured streak)'
    labels: [reason]
  index_db_size:
    name: blockbook_index_db_size
    type: gauge
    help: Whole RocksDB footprint on disk, in bytes
  explorer_views:
    name: blockbook_explorer_views
    type: counter_vec
    help: Explorer UI and public API hits, labeled by route action
    labels: [action]
  mempool_size:
    name: blockbook_mempool_size
    type: gauge
    help: Transactions retained from the last successful backend reload
  eth_alternative_mempool_reconciliation_events_total:
    name: blockbook_eth_alternative_mempool_reconciliation_events_total
    type: counter_vec
    help: Alternative send-transaction mempool cache lifecycle decisions, labeled by action - skipped_fresh and kept retain an entry for the next cycle, provider_error and provider_missing_pending keep an unconfirmed entry pending retry, and mined, nonce_superseded, provider_missing, timeout (from the reconcile loop or a read-path expiry) and rbf_replaced (fee replacement) remove it
    labels: [action]
  eth_alternative_mempool_tx_residence_seconds:
    name: blockbook_eth_alternative_mempool_tx_residence_seconds
    type: histogram_vec
    help: Age in seconds (time since broadcast) of an alternative send-transaction cache entry at the moment it leaves the cache, labeled by the removing action (mined, nonce_superseded, provider_missing, timeout or rbf_replaced) - reveals how long unconfirmed txs actually survive before each exit reason fires
    labels: [action]
    buckets: [30, 60, 120, 180, 300, 450, 600, 900, 1200, 1800, 3600]
  eth_alternative_mempool_cache_size:
    name: blockbook_eth_alternative_mempool_cache_size
    type: gauge
    help: Transactions currently held in the alternative send-transaction mempool cache, sampled at the end of every reconcile cycle
  eth_alternative_nonce_requests_total:
    name: blockbook_eth_alternative_nonce_requests_total
    type: counter_vec
    help: eth_getTransactionCount lookups actually routed to the alternative send-transaction provider, labeled by result - success (the provider answered and its pending nonce was served, raised to the mempool floor) or error (the provider failed and the lookup fell back to the primary RPC). Only addresses that recently sent a private transaction through the provider are routed here (see useForNonces), so this counts the small gated subset, not every address request - a low, mostly-success rate confirms the gating is keeping the hot eth_getTransactionCount endpoint off the provider's rate quota
    labels: [result]
  estimated_fee:
    name: blockbook_estimated_fee
    type: gauge_vec
    help: Fee estimator output by target block count and conservative mode, in chain-specific units
    labels: [blocks, conservative]
  avg_block_period:
    name: blockbook_avg_block_period
    type: gauge
    help: Observed average spacing of the last 100 blocks' header timestamps, in seconds (chain pace, not indexing cadence)
  sync_block_stats:
    name: blockbook_sync_block_stats
    type: gauge_vec
    help: Block processing counters for bulk intervals and chain-tip blocks, labeled by scope and stat kind
    labels: [scope, kind]
  sync_hotness_stats:
    name: blockbook_sync_hotness_stats
    type: gauge_vec
    help: Ethereum-type hot-address cache activity during bulk and tip processing, labeled by scope and stat kind
    labels: [scope, kind]
  addr_contracts_cache_entries:
    name: blockbook_addr_contracts_cache_entries
    type: gauge
    help: Number of entries in the Ethereum-type addressContracts in-memory cache
  addr_contracts_cache_bytes:
    name: blockbook_addr_contracts_cache_bytes
    type: gauge
    help: Estimated memory used by the Ethereum-type addressContracts cache
  addr_contracts_cache_hits_total:
    name: blockbook_addr_contracts_cache_hits_total
    type: counter
    help: addressContracts cache lookups served from memory
  addr_contracts_cache_misses_total:
    name: blockbook_addr_contracts_cache_misses_total
    type: counter
    help: addressContracts cache lookups that had to read from RocksDB
  addr_contracts_cache_flush_total:
    name: blockbook_addr_contracts_cache_flush_total
    type: counter_vec
    help: addressContracts cache flushes by trigger reason
    labels: [reason]
  dbcolumn_rows:
    name: blockbook_dbcolumn_rows
    type: gauge_vec
    help: Row count per RocksDB column family
    labels: [column]
  dbcolumn_size:
    name: blockbook_dbcolumn_size
    type: gauge_vec
    help: Disk footprint per RocksDB column family, in bytes
    labels: [column]
  app_info:
    name: blockbook_app_info
    type: gauge_vec
    help: Build and backend version information exported as labels with value 1
    labels: [blockbook_version, blockbook_commit, blockbook_buildtime, backend_version, backend_subversion, backend_protocol_version]
  best_height:
    name: blockbook_best_height
    type: gauge
    help: Newest block height persisted in Blockbook's index
  synchronized:
    name: blockbook_synchronized
    type: gauge
    help: 1 when /api/status reports inSync, 0 otherwise; sustained 0 outside initial sync means the index is not keeping up with the tip, for example after a stalled tip feed
  backend_best_height:
    name: blockbook_backend_best_height
    type: gauge
    help: Current backend tip height as last observed by Blockbook
  tip_age_seconds:
    name: blockbook_tip_age_seconds
    type: gauge
    help: Seconds since polling last observed the backend best height advance
  backend_subscription_age_seconds:
    name: blockbook_backend_subscription_age_seconds
    type: gauge
    help: Seconds since the push tip feed last delivered a notification; high or growing values indicate a stalled feed
  backend_subscription_events:
    name: blockbook_backend_subscription_events
    type: counter_vec
    help: Push tip-feed lifecycle and watchdog events, labeled by subscription (newHeads, newPendingTransactions, rpc, or zeromq for Tron) and event (error, resubscribed, resubscribe_failed, watchdog_tick, watchdog_stall, watchdog_reconnect, watchdog_reconnect_failed, watchdog_tip_advanced, watchdog_tip_rollback); watchdog_tick is emitted once per watchdog evaluation
    labels: [subscription, event]
  average_block_time_seconds:
    name: blockbook_average_block_time_seconds
    type: gauge
    help: Configured nominal block interval for the chain, in seconds; 0 means unavailable
  explorer_pending_requests:
    name: blockbook_explorer_pending_requests
    type: gauge_vec
    help: In-flight explorer HTTP handlers, labeled by handler method
    labels: [method]
  websocket_pending_requests:
    name: blockbook_websocket_pending_requests
    type: gauge_vec
    help: In-flight websocket request handlers, labeled by websocket method
    labels: [method]
  xpub_cache_size:
    name: blockbook_xpub_cache_size
    type: gauge
    help: UTXO-only population of in-memory extended public-key lookup entries
  coingecko_requests:
    name: blockbook_coingecko_requests
    type: counter_vec
    help: External market-data API calls split by endpoint and outcome status
    labels: [endpoint, status]
  coingecko_range_requests:
    name: blockbook_coingecko_range_requests
    type: counter_vec
    help: Historical ticker download ranges chosen by the fiat updater
    labels: [range]
  fiat_rates_update_duration_seconds:
    name: blockbook_fiat_rates_update_duration_seconds
    type: histogram_vec
    help: Time spent in fiat-rate downloader stages such as current, hourly, historical and token ticker updates
    labels: [stage, status]
    buckets: [0.01, 0.05, 0.1, 0.25, 0.5, 1, 2, 5, 10, 20, 30, 60, 120, 300]
  fiat_rates_fetched_units_total:
    name: blockbook_fiat_rates_fetched_units_total
    type: counter_vec
    help: Daily fiat-rate time-units fetched and persisted, split by fetch phase (tip, backfill, bootstrap, reconcile)
    labels: [phase]
  fiat_rates_fetched_tokens_total:
    name: blockbook_fiat_rates_fetched_tokens_total
    type: counter_vec
    help: Token fiat-rate series fetched and persisted, split by fetch phase (backfill, bootstrap, reconcile)
    labels: [phase]
  fiat_rates_unable_total:
    name: blockbook_fiat_rates_unable_total
    type: counter_vec
    help: Fiat-rate series that could not be fetched, split by phase and reason (gap_too_large, fetch_failed, provider_banned, no_base_ticker, budget_exhausted)
    labels: [phase, reason]
  alternative_fee_provider_requests:
    name: blockbook_alternative_fee_provider_requests
    type: counter_vec
    help: Requests to external fee providers, labeled by provider and outcome status
    labels: [provider, status]
  alternative_fee_provider_last_sync_timestamp_seconds:
    name: blockbook_alternative_fee_provider_last_sync_timestamp_seconds
    type: gauge_vec
    help: Unix time of the last successful refresh of the cached EVM alternative-provider fees, labeled by provider (infura or 1inch). Plot time() - this for cache age; the pull path falls back to on-chain once the cache is older than the provider's stale window (for infura, 30x the poll period, e.g. 30m at a 60s poll). Exported as a timestamp rather than a computed *_age_seconds gauge on purpose - it is only written on a successful refresh, so age keeps rising when a provider wedges and it is restart-safe
    labels: [provider]
  eth_eip1559_fee:
    name: blockbook_eth_eip1559_fee
    type: gauge_vec
    help: Most recent EIP-1559 fee tier served by the pull path (estimateFee / EthereumTypeGetEip1559Fees), in wei - divide by 1e9 for Gwei; labeled by tier (low/medium/high/instant) and kind (max_fee = maxFeePerGas, priority_fee = maxPriorityFeePerGas). EVM fees are otherwise invisible (estimated_fee is UTXO-only). Last-writer-wins per estimate, like estimated_fee
    labels: [tier, kind]
  eth_eip1559_base_fee:
    name: blockbook_eth_eip1559_base_fee
    type: gauge
    help: Base fee underlying the most recent pull-path EIP-1559 estimate, in wei - divide by 1e9 for Gwei. The alternative provider's reported base fee when served from a provider, otherwise eth_feeHistory's last requested-window base fee (baseFeePerGas[blocks-1]); on backends that drop the extra projected element (e.g. Erigon) that is already the next-block projection, on others it is the most recent included block. Pair with eth_block_base_fee to see projection vs realized
  eth_eip1559_fee_source_total:
    name: blockbook_eth_eip1559_fee_source_total
    type: counter_vec
    help: Served EIP-1559 pull-path estimates by source observed at the serve boundary - provider (alternative provider cache hit), onchain_fallback (provider configured but cache stale/unready, served from eth_feeHistory) or onchain (no provider configured). Complements alternative_fee_provider_requests (background fetch) and alternative_fee_provider_last_sync_timestamp_seconds (cache age), which together explain why a fallback happened
    labels: [source]
  eth_block_gas_used_ratio:
    name: blockbook_eth_block_gas_used_ratio
    type: gauge
    help: gasUsed / gasLimit of the most recently connected EVM block (0..1), the congestion signal that drives the next base fee - above 0.5 the next block's base fee rises (up to +12.5% per block), below 0.5 it falls. This is the push path's view of why fees move; updated once per connected block, so it sweeps catch-up blocks and settles on the tip
  eth_block_base_fee:
    name: blockbook_eth_block_base_fee
    type: gauge
    help: Base fee per gas of the most recently connected EVM block, in wei - divide by 1e9 for Gwei. The realized base fee from the block header (push path); compare with eth_eip1559_base_fee (the pull path's next-block projection) to see whether the projection tracks the chain. Updated once per connected block
  rpc_sync_latency:
    name: blockbook_rpc_sync_latency
    type: histogram_vec
    help: Blockbook-to-backend round-trip time for sync-internal RPC calls (eth_getBlockByHash, eth_getLogs, debug_traceBlockByHash, etc.), in milliseconds, labeled by method and whether the call failed. Typically sub-100ms; multi-second values mean an overloaded backend, and observations near 10-15s are trace_timeout/rpc_timeout expiries rather than real round trips
    labels: [method, error]
    buckets: [1, 5, 10, 25, 50, 100, 250, 500, 1000, 2000, 5000, 10000, 20000]
  eth_sync_rpc_errors:
    name: blockbook_eth_sync_rpc_errors
    type: counter_vec
    help: Ethereum sync RPC failures by method and error status such as timeout, HTTP class, RPC error or generic error
    labels: [method, status]
