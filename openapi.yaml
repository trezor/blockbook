      type: object
      required: [id, method]
      properties:
        id:
          type: string
          description: Client-chosen request id echoed by the response.
        method:
          type: string
          enum:
            - getAccountInfo
            - getContractInfo
            - getInfo
            - getBlockHash
            - getBlock
            - getAccountUtxo
            - getBalanceHistory
            - getTransaction
            - getTransactionSpecific
            - estimateFee
            - longTermFeeRate
            - sendTransaction
            - getMempoolFilters
            - getBlockFilter
            - getBlockFiltersBatch
            - rpcCall
