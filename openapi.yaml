          type: string
        version:
          type: integer
        lockTime:
          type: integer
        vin:
          type: array
          items:
            $ref: "#/components/schemas/Vin"
        vout:
          type: array
          items:
            $ref: "#/components/schemas/Vout"
        blockHash:
          type: string
        blockHeight:
          type: integer
          description: -1 for unconfirmed transactions.
        confirmations:
          type: integer
          minimum: 0
        confirmationETABlocks:
          type: integer
        confirmationETASeconds:
          type: integer
          format: int64
        blockTime:
          type: integer
          format: int64
        size:
          type: integer
        vsize:
          type: integer
        value:
          $ref: "#/components/schemas/AmountString"
        valueIn:
          $ref: "#/components/schemas/AmountString"
        fees:
          $ref: "#/components/schemas/AmountString"
        hex:
          type: string
        rbf:
          type: boolean
        coinSpecificData:
