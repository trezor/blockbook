            - $ref: "#/components/schemas/FiatTickers"
            - $ref: "#/components/schemas/AvailableVsCurrencies"
            - $ref: "#/components/schemas/WsRpcCallRes"
            - $ref: "#/components/schemas/MempoolTxidFilterEntries"
            - $ref: "#/components/schemas/WsErrorData"
            - type: object

