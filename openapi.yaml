openapi: 3.1.0
info:
  title: Blockbook API
  version: "2.0.0-draft"
  summary: REST and WebSocket API for indexed blockchain data served by Blockbook.
  license:
    name: GNU Affero General Public License v3.0
    identifier: AGPL-3.0-only
  description: |-
    Practical OpenAPI description of the Blockbook public API, based on
    docs/api.md, blockbook-api.ts, api/xpub.go, and the api/server handlers.

    This is intentionally a high-confidence first pass: common REST endpoints
    and the WebSocket request envelope are documented in detail, while
    blockchain-specific payloads remain extensible where Blockbook returns raw
    backend JSON.

    Amounts are strings in the lowest denomination of the chain, such as
    satoshis or wei, without a decimal point. Blockbook omits empty fields.
    The dev ports supplied for this draft answer with TLS, so the working
    server URLs below use https and wss.
servers:
  - url: https://blockbook-dev.corp.sldev.cz:9116
    description: Ethereum dev Blockbook
  - url: https://blockbook-dev.corp.sldev.cz:9130
    description: Bitcoin dev Blockbook
tags:
  - name: Status
    description: Blockbook and backend status.
  - name: Blocks
    description: Block, block hash, raw block, and filter endpoints.
  - name: Transactions
    description: Transaction lookup and broadcast endpoints.
  - name: Accounts
    description: Address, XPUB, UTXO, and balance history endpoints.
  - name: Contracts
    description: Smart contract and token metadata endpoints.
  - name: Fees
    description: Fee estimation and fee statistics endpoints.
  - name: Fiat
    description: Fiat and token rate endpoints.
  - name: WebSocket
    description: WebSocket upgrade endpoint and message schemas.
security: []

paths:
  /api/status:
    get:
      tags: [Status]
      operationId: getStatus
      summary: Get Blockbook and backend status.
      description: Returns Blockbook sync state and connected backend metadata.
      responses:
        "200":
          description: Current Blockbook and backend status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"
        default:
          $ref: "#/components/responses/Error"

  /api/:
    get:
      tags: [Status]
      operationId: getApiIndexStatus
      summary: Get status from the API index handler.
      description: Alias served by the same handler as /api/status on full public interfaces.
      responses:
        "200":
          description: Current Blockbook and backend status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/block-index/{height}:
    get:
      tags: [Blocks]
      operationId: getBlockHashByHeight
      summary: Get a block hash by height.
      parameters:
        - name: height
          in: path
          required: true
          description: Block height on the backend main chain.
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Block hash at the requested height.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockHashResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/block/{blockId}:
    get:
      tags: [Blocks]
      operationId: getBlock
      summary: Get a block by height or hash.
      description: Returns paged full transaction details when extended indexing is enabled.
      parameters:
        - name: blockId
          in: path
          required: true
          description: Block height or block hash.
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Block details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Block"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/rawblock/{blockId}:
    get:
      tags: [Blocks]
      operationId: getRawBlock
      summary: Get raw block hex.
      parameters:
        - name: blockId
          in: path
          required: true
          description: Block height or block hash.
          schema:
            type: string
      responses:
        "200":
          description: Raw block data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockRaw"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/block-filters/:
    get:
      tags: [Blocks]
      operationId: getBlockFilters
      summary: Get compact block filters.
      description: Requires the script type configured on the Blockbook instance and either lastN or a from/to range.
      parameters:
        - name: scriptType
          in: query
          required: true
          description: Script type configured for block filters on this instance, for example taproot.
          schema:
            type: string
        - name: lastN
          in: query
          description: Return filters for the last N blocks.
          schema:
            type: integer
            minimum: 1
        - name: from
          in: query
          description: First block height in the requested range.
          schema:
            type: integer
            minimum: 0
        - name: to
          in: query
          description: Last block height in the requested range. Defaults to the current best height when omitted.
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Block filters keyed by block height.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockFilters"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/tx/{txid}:
    get:
      tags: [Transactions]
      operationId: getTransaction
      summary: Get a normalized transaction.
      description: Returns the common transaction shape shared across supported chains.
      parameters:
        - name: txid
          in: path
          required: true
          description: Transaction id/hash.
          schema:
            type: string
        - name: spending
          in: query
          description: Include spending transaction metadata for UTXO outputs when available.
          schema:
            type: boolean
      responses:
        "200":
          description: Normalized transaction.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tx"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/tx-specific/{txid}:
    get:
      tags: [Transactions]
      operationId: getTransactionSpecific
      summary: Get blockchain-specific transaction JSON.
      description: Returns raw backend-specific transaction details, useful for fields not present in the normalized Tx schema.
      parameters:
        - name: txid
          in: path
          required: true
          description: Transaction id/hash.
          schema:
            type: string
      responses:
        "200":
          description: Chain-specific transaction payload.
          content:
            application/json:
              schema:
                description: Arbitrary chain-specific transaction payload.
        default:
          $ref: "#/components/responses/Error"

  /api/rawtx/{txid}:
    get:
      tags: [Transactions]
      operationId: getRawTransaction
      summary: Get raw transaction hex.
      description: Unversioned public endpoint exposed by Blockbook for raw transaction data.
      parameters:
        - name: txid
          in: path
          required: true
          description: Transaction id/hash.
          schema:
            type: string
      responses:
        "200":
          description: Raw transaction hex as a JSON string.
          content:
            application/json:
              schema:
                type: string
        default:
          $ref: "#/components/responses/Error"

  /api/v2/sendtx/{hex}:
    get:
      tags: [Transactions]
      operationId: sendTransactionByGet
      summary: Broadcast a raw transaction using the path.
      description: Broadcasts hex-encoded raw transaction data. Prefer POST for large payloads.
      parameters:
        - name: hex
          in: path
          required: true
          description: Hex-encoded raw transaction.
          schema:
            type: string
            pattern: "^[0-9a-fA-F]+$"
      responses:
        "200":
          description: Broadcast result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendTransactionResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/sendtx/:
    post:
      tags: [Transactions]
      operationId: sendTransactionByPost
      summary: Broadcast a raw transaction using the request body.
      description: The trailing slash is mandatory in the Blockbook handler.
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              pattern: "^[0-9a-fA-F]+$"
      responses:
        "200":
          description: Broadcast result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendTransactionResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/address/{address}:
    get:
      tags: [Accounts]
      operationId: getAddress
      summary: Get address/account details.
      description: Returns balance, transaction history, token balances, and chain-specific account metadata according to the requested detail level.
      parameters:
        - name: address
          in: path
          required: true
          description: Chain address.
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/FromHeight"
        - $ref: "#/components/parameters/ToHeight"
        - $ref: "#/components/parameters/Details"
        - $ref: "#/components/parameters/Filter"
        - $ref: "#/components/parameters/ContractFilter"
        - $ref: "#/components/parameters/Protocols"
        - $ref: "#/components/parameters/SecondaryCurrency"
      responses:
        "200":
          description: Address/account details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/xpub/{xpub}:
    get:
      tags: [Accounts]
      operationId: getXpub
      summary: Get XPUB or descriptor account details.
      description: |-
        Returns aggregate account information for an XPUB or supported output
        descriptor. URL-encode descriptors before placing them after /xpub/.
      parameters:
        - name: xpub
          in: path
          required: true
          allowReserved: true
          description: XPUB or supported descriptor.
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/FromHeight"
        - $ref: "#/components/parameters/ToHeight"
        - $ref: "#/components/parameters/Details"
        - $ref: "#/components/parameters/Tokens"
        - $ref: "#/components/parameters/Filter"
        - $ref: "#/components/parameters/ContractFilter"
        - $ref: "#/components/parameters/Protocols"
        - $ref: "#/components/parameters/SecondaryCurrency"
        - $ref: "#/components/parameters/Gap"
      responses:
        "200":
          description: XPUB/descriptor account details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/utxo/{descriptor}:
    get:
      tags: [Accounts]
      operationId: getUtxo
      summary: Get UTXOs for an address, XPUB, or descriptor.
      parameters:
        - name: descriptor
          in: path
          required: true
          allowReserved: true
          description: Address, XPUB, or supported descriptor. URL-encode descriptors.
          schema:
            type: string
        - name: confirmed
          in: query
          description: When true, return only confirmed UTXOs.
          schema:
            type: boolean
        - $ref: "#/components/parameters/Gap"
      responses:
        "200":
          description: UTXO list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Utxo"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/balancehistory/{descriptor}:
    get:
      tags: [Accounts]
      operationId: getBalanceHistory
      summary: Get account balance history.
      parameters:
        - name: descriptor
          in: path
          required: true
          allowReserved: true
          description: Address, XPUB, or supported descriptor.
          schema:
            type: string
        - name: from
          in: query
          description: Unix timestamp lower bound.
          schema:
            type: integer
            format: int64
        - name: to
          in: query
          description: Unix timestamp upper bound.
          schema:
            type: integer
            format: int64
        - name: fiatcurrency
          in: query
          description: Optional fiat currency code to include in rates.
          schema:
            type: string
            example: usd
        - name: groupBy
          in: query
          description: Aggregation interval in seconds. Defaults to 3600.
          schema:
            type: integer
            minimum: 1
        - $ref: "#/components/parameters/Gap"
      responses:
        "200":
          description: Balance history points.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BalanceHistory"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/contract/{contract}:
    get:
      tags: [Contracts]
      operationId: getContractInfo
      summary: Get contract metadata.
      description: Returns indexed token/contract metadata and optional current protocol enrichments such as ERC4626.
      parameters:
        - name: contract
          in: path
          required: true
          description: Smart contract address.
          schema:
            type: string
        - name: currency
          in: query
          description: Secondary currency code for rates.
          schema:
            type: string
            example: usd
        - $ref: "#/components/parameters/Protocols"
      responses:
        "200":
          description: Contract metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractInfoResult"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/estimatefee/{blocks}:
    get:
      tags: [Fees]
      operationId: estimateFee
      summary: Estimate a fee target.
      parameters:
        - name: blocks
          in: path
          required: true
          description: Confirmation target in blocks.
          schema:
            type: integer
            minimum: 1
        - name: conservative
          in: query
          description: Use conservative smart fee estimation where supported.
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Decimal fee estimate in chain base currency.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultStringResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/feestats/{blockId}:
    get:
      tags: [Fees]
      operationId: getFeeStats
      summary: Get fee statistics for a block.
      parameters:
        - name: blockId
          in: path
          required: true
          description: Block height or block hash.
          schema:
            type: string
      responses:
        "200":
          description: Fee statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeStats"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/tickers/:
    get:
      tags: [Fiat]
      operationId: getFiatTicker
      summary: Get current or historical fiat rates.
      parameters:
        - name: currency
          in: query
          description: Optional currency code. When omitted, all available rates can be returned.
          schema:
            type: string
            example: usd
        - name: timestamp
          in: query
          description: Unix timestamp for historical rates.
          schema:
            type: integer
            format: int64
        - name: block
          in: query
          description: Block height or hash whose timestamp should be used for historical rates.
          schema:
            type: string
        - name: token
          in: query
          description: Optional token symbol or contract/address key for token-specific rates.
          schema:
            type: string
      responses:
        "200":
          description: Fiat rate ticker.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FiatTicker"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/multi-tickers/:
    get:
      tags: [Fiat]
      operationId: getFiatTickersForTimestamps
      summary: Get fiat rates for multiple timestamps.
      parameters:
        - name: timestamp
          in: query
          required: true
          description: Comma-separated Unix timestamps.
          schema:
            type: string
            pattern: "^[0-9]+(,[0-9]+)*$"
            example: "1710000000,1720000000"
        - name: currency
          in: query
          description: Optional currency code.
          schema:
            type: string
            example: usd
        - name: token
          in: query
          description: Optional token symbol or contract/address key.
          schema:
            type: string
      responses:
        "200":
          description: Fiat rate tickers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FiatTicker"
        default:
          $ref: "#/components/responses/Error"

  /api/v2/tickers-list/:
    get:
      tags: [Fiat]
      operationId: getFiatTickersList
      summary: Get currencies available for a timestamp.
      parameters:
        - name: timestamp
          in: query
          required: true
          description: Unix timestamp for the requested currency list.
          schema:
            type: integer
            format: int64
        - name: token
          in: query
          description: Optional token symbol or contract/address key.
          schema:
            type: string
      responses:
        "200":
          description: Available currencies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableVsCurrencies"
        default:
          $ref: "#/components/responses/Error"

  /websocket:
    get:
      tags: [WebSocket]
      operationId: connectWebSocket
      summary: WebSocket upgrade endpoint.
      description: |-
        Connect with a WebSocket client and exchange JSON messages using the
        WsRequest/WsResponse schemas. Common method parameter schemas are
        defined under components.schemas.
      servers:
        - url: wss://blockbook-dev.corp.sldev.cz:9116
          description: Ethereum dev WebSocket
        - url: wss://blockbook-dev.corp.sldev.cz:9130
          description: Bitcoin dev WebSocket
      responses:
        "101":
          description: WebSocket protocol upgrade.
        "400":
          description: Bad WebSocket upgrade request.
      x-websocket-request:
        $ref: "#/components/schemas/WsRequest"
      x-websocket-response:
        $ref: "#/components/schemas/WsResponse"

components:
  parameters:
    Page:
      name: page
      in: query
      description: 1-based page index. Values outside safe bounds are sanitized by the server.
      schema:
        type: integer
        minimum: 1
    PageSize:
      name: pageSize
      in: query
      description: Number of history items per page. The REST account endpoints cap this at 1000.
      schema:
        type: integer
        minimum: 1
        maximum: 1000
    FromHeight:
      name: from
      in: query
      description: First block height included in account transaction filtering.
      schema:
        type: integer
        minimum: 0
    ToHeight:
      name: to
      in: query
      description: Last block height included in account transaction filtering.
      schema:
        type: integer
        minimum: 0
    Details:
      name: details
      in: query
      description: Controls how much account data is returned.
      schema:
        type: string
        default: txids
        enum: [basic, tokens, tokenBalances, txids, txslight, txs]
    Tokens:
      name: tokens
      in: query
      description: Controls which XPUB-derived token/address rows are included.
      schema:
        type: string
        default: nonzero
        enum: [nonzero, used, derived]
    Filter:
      name: filter
      in: query
      description: Filter account history by input/output side, or by numeric token/internal filter id.
      schema:
        oneOf:
          - type: string
            enum: [inputs, outputs]
          - type: integer
            minimum: 0
    ContractFilter:
      name: contract
      in: query
      description: Contract address used to filter token data.
      schema:
        type: string
    Protocols:
      name: protocols
      in: query
      description: "Optional protocol enrichments, comma-separated or repeated. Currently known value: erc4626."
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
          example: erc4626
    SecondaryCurrency:
      name: secondary
      in: query
      description: Secondary currency code used to populate fiat values.
      schema:
        type: string
        example: usd
    Gap:
      name: gap
      in: query
      description: XPUB/address derivation gap limit. Values are capped by the server.
      schema:
        type: integer
        minimum: 0
        maximum: 10000

  responses:
    Error:
      description: Public API error. Public validation errors are HTTP 400; internal errors are HTTP 500.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.

    AmountString:
      type: string
      pattern: "^-?[0-9]+$"
      description: Integer amount in the lowest chain denomination, encoded as a string.
      examples: ["100000000", "17177839694340"]

    TokenStandard:
      type: string
      description: Token standard name. Empty string means no token standard is known.
      enum: ["", XPUBAddress, ERC20, ERC721, ERC1155, BEP20, BEP721, BEP1155, TRC20, TRC721, TRC1155]

    BlockHashResponse:
      type: object
      required: [blockHash]
      properties:
        blockHash:
          type: string

    ResultStringResponse:
      type: object
      required: [result]
      properties:
        result:
          type: string
          description: Result string, usually a decimal amount in chain base currency.

    SendTransactionResponse:
      type: object
      required: [result]
      properties:
        result:
          type: string
          description: Broadcast transaction id/hash.

    AddressAlias:
      type: object
      properties:
        Type:
          type: string
          description: Alias type.
        Alias:
          type: string
          description: Alias text.

    AddressAliases:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/AddressAlias"

    MultiTokenValue:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/AmountString"
        value:
          $ref: "#/components/schemas/AmountString"

    TokenTransfer:
      type: object
      required: [type, standard, from, to, contract]
      properties:
        type:
          deprecated: true
          $ref: "#/components/schemas/TokenStandard"
        standard:
          $ref: "#/components/schemas/TokenStandard"
        from:
          type: string
        to:
          type: string
        contract:
          type: string
        name:
          type: string
        symbol:
          type: string
        decimals:
          type: integer
        value:
          $ref: "#/components/schemas/AmountString"
        multiTokenValues:
          type: array
          items:
            $ref: "#/components/schemas/MultiTokenValue"

    Vin:
      type: object
      required: [n, isAddress]
      properties:
        txid:
          type: string
        vout:
          type: integer
          minimum: 0
        sequence:
          type: integer
        n:
          type: integer
          minimum: 0
        addresses:
          type: array
          items:
            type: string
        isAddress:
          type: boolean
        isOwn:
          type: boolean
        value:
          $ref: "#/components/schemas/AmountString"
        hex:
          type: string
        asm:
          type: string
        coinbase:
          type: string

    Vout:
      type: object
      required: [n, addresses, isAddress]
      properties:
        value:
          $ref: "#/components/schemas/AmountString"
        n:
          type: integer
          minimum: 0
        spent:
          type: boolean
        spentTxId:
          type: string
        spentIndex:
          type: integer
        spentHeight:
          type: integer
        hex:
          type: string
        asm:
          type: string
        addresses:
          type: array
          items:
            type: string
        isAddress:
          type: boolean
        isOwn:
          type: boolean
        type:
          type: string

    EthereumInternalTransfer:
      type: object
      required: [type, from, to]
      properties:
        type:
          type: integer
          description: Chain-specific internal transfer type.
        from:
          type: string
        to:
          type: string
        value:
          $ref: "#/components/schemas/AmountString"

    EthereumParsedInputParam:
      type: object
      required: [type]
      properties:
        type:
          type: string
        values:
          type: array
          items:
            type: string

    EthereumParsedInputData:
      type: object
      required: [methodId, name]
      properties:
        methodId:
          type: string
          description: First 4 bytes of the input data.
        name:
          type: string
          description: Parsed function name when recognized.
        function:
          type: string
          description: Full function signature when recognized.
        params:
          type: array
          items:
            $ref: "#/components/schemas/EthereumParsedInputParam"

    EthereumSpecific:
      type: object
      required: [status, nonce]
      properties:
        type:
          type: integer
        createdContract:
          type: string
        status:
          type: integer
          description: 1 success, 0 failed, -1 pending.
        error:
          type: string
        nonce:
          type: integer
          format: int64
        gasLimit:
          type: integer
          format: int64
        gasUsed:
          type: integer
          format: int64
        gasPrice:
          $ref: "#/components/schemas/AmountString"
        maxPriorityFeePerGas:
          $ref: "#/components/schemas/AmountString"
        maxFeePerGas:
          $ref: "#/components/schemas/AmountString"
        baseFeePerGas:
          $ref: "#/components/schemas/AmountString"
        l1Fee:
          type: integer
          format: int64
        l1FeeScalar:
