          format: int64
        l1FeeScalar:
          type: string
        l1GasPrice:
          $ref: "#/components/schemas/AmountString"
        l1GasUsed:
          type: integer
          format: int64
        data:
          type: string
        parsedData:
          $ref: "#/components/schemas/EthereumParsedInputData"
        internalTransfers:
          type: array
          items:
            $ref: "#/components/schemas/EthereumInternalTransfer"

    TxChainExtraData:
      type: object
