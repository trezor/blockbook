  schemas:
    LegacyObject:
      type: object
      description: Legacy Bitcore Insight-compatible payload. Use API V2 for stable typed schemas.
      additionalProperties: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.

    AmountString:
      type: string
      pattern: "^-?[0-9]+$"
      description: Integer amount in the lowest chain denomination, encoded as a string.
      examples: ["100000000", "17177839694340"]

    TokenStandard:
      type: string
      description: Token standard name. Empty string means no token standard is known.
      enum: ["", XPUBAddress, ERC20, ERC721, ERC1155, BEP20, BEP721, BEP1155, TRC20, TRC721, TRC1155]

    BlockHashResponse:
      type: object
      required: [blockHash]
      properties:
        blockHash:
          type: string

    ResultStringResponse:
      type: object
      required: [result]
      properties:
        result:
          type: string
          description: Result string, usually a decimal amount in chain base currency.

    SendTransactionResponse:
      type: object
      required: [result]
      properties:
        result:
          type: string
          description: Broadcast transaction id/hash.

    AddressAlias:
      type: object
      properties:
        Type:
          type: string
        Alias:
          type: string

    AddressAliases:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/AddressAlias"

    MultiTokenValue:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/AmountString"
        value:
          $ref: "#/components/schemas/AmountString"

    TokenTransfer:
      type: object
      required: [type, standard, from, to, contract]
      properties:
        type:
          deprecated: true
          $ref: "#/components/schemas/TokenStandard"
        standard:
          $ref: "#/components/schemas/TokenStandard"
        from:
          type: string
        to:
          type: string
        contract:
          type: string
        name:
          type: string
        symbol:
          type: string
        decimals:
          type: integer
        value:
          $ref: "#/components/schemas/AmountString"
        multiTokenValues:
          type: array
          items:
            $ref: "#/components/schemas/MultiTokenValue"

    Vin:
      type: object
      required: [n, isAddress]
      properties:
        txid:
          type: string
        vout:
          type: integer
          minimum: 0
        sequence:
          type: integer
        n:
          type: integer
          minimum: 0
        addresses:
          type: array
          items:
            type: string
        isAddress:
          type: boolean
        isOwn:
          type: boolean
        value:
          $ref: "#/components/schemas/AmountString"
        hex:
          type: string
        asm:
          type: string
        coinbase:
          type: string

    Vout:
      type: object
      required: [n, addresses, isAddress]
      properties:
        value:
          $ref: "#/components/schemas/AmountString"
        n:
          type: integer
          minimum: 0
        spent:
          type: boolean
        spentTxId:
          type: string
        spentIndex:
          type: integer
        spentHeight:
          type: integer
        hex:
          type: string
        asm:
          type: string
        addresses:
          oneOf:
            - type: array
              items:
                type: string
            - type: "null"
        isAddress:
          type: boolean
        isOwn:
          type: boolean
        type:
          type: string

    EthereumInternalTransfer:
      type: object
      required: [type, from, to]
      properties:
        type:
          type: integer
        from:
          type: string
        to:
          type: string
        value:
          $ref: "#/components/schemas/AmountString"

    EthereumParsedInputParam:
      type: object
      required: [type]
      properties:
        type:
          type: string
        values:
          type: array
          items:
            type: string

    EthereumParsedInputData:
      type: object
      required: [methodId, name]
      properties:
        methodId:
          type: string
          description: First 4 bytes of the input data.
        name:
          type: string
          description: Parsed function name when recognized.
        function:
          type: string
          description: Full function signature when recognized.
        params:
          type: array
          items:
            $ref: "#/components/schemas/EthereumParsedInputParam"

    EthereumSpecific:
      type: object
      required: [status, nonce]
      properties:
        type:
          type: integer
        createdContract:
          type: string
        status:
          type: integer
          description: 1 success, 0 failed, -1 pending.
        error:
          type: string
        nonce:
          type: integer
          format: int64
        gasLimit:
          type: integer
          format: int64
        gasUsed:
          type: integer
          format: int64
        gasPrice:
